<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mikami Sushi — Cozinha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-cozinha">

  <header class="main-header">
    <div class="header-brand">
      <span class="kanji">御</span>
      <div class="brand-text">
        <h1>Mikami Sushi</h1>
        <p class="brand-sub">Cozinha / Pedidos Ativos</p>
      </div>
    </div>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Mesas</a>
      <a href="cozinha.html" class="nav-link active">Cozinha</a>
      <a href="relatorio.html" class="nav-link">Relatório</a>
    </nav>
    <div class="header-clock" id="headerClock"></div>
  </header>

  <div class="cozinha-filtros">
    <button class="filtro-btn active" data-filtro="todos">Todos</button>
    <button class="filtro-btn" data-filtro="Novo"><span class="badge-novo">Novo</span></button>
    <button class="filtro-btn" data-filtro="Em preparo"><span class="badge-preparo">Em preparo</span></button>
    <button class="filtro-btn" data-filtro="Pronto"><span class="badge-pronto">Pronto</span></button>
    <button class="filtro-btn" data-filtro="Entregue"><span class="badge-entregue">Entregue</span></button>
    <div class="cozinha-contador">
      <span id="pedidosAtivosCount">0 pedidos ativos</span>
    </div>
  </div>

  <main class="cozinha-main">
    <div class="pedidos-grid" id="pedidosGrid">
      <div class="loading-mesas">
        <div class="loading-spinner"></div>
        <p>Aguardando pedidos...</p>
      </div>
    </div>
  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
